<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Registrazione GoalToGo</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
<header class="header">
    <h1>GOAL TO GO</h1>
    <div class="profile-icon"></div>
</header>

<div class="container container--center">

    <section class="welcome welcome--center">
        <h2>Registrati</h2>
    </section>

    <div class="toggle">
        <button type="button" class="toggle-btn active" onclick="switchMode('giocatore')">
            sono un giocatore
        </button>
        <button type="button" class="toggle-btn" onclick="switchMode('campo')">
            ho un campo
        </button>
    </div>

    <form id="formRegistrazione">

        <!-- 👤 GIOCATORE -->
        <div id="form-giocatore" class="form active-form">
            <div class="login-box">
                <input name="email" placeholder="email" required>
            </div>
            <div class="login-box">
                <input name="nickname" placeholder="nome utente" required>
            </div>
            <div class="login-box">
                <input type="password" name="password" placeholder="password" required>
            </div>
            <div class="login-box">
                <input type="password" name="confirm" placeholder="conferma password" required>
            </div>
        </div>

        <!-- 🏟 CAMPO -->
        <div id="form-campo" class="form">
            <div class="login-box">
                <input name="email" placeholder="email" disabled>
            </div>
            <div class="login-box">
                <input name="nickname" placeholder="nome utente" disabled>
            </div>
            <div class="login-box">
                <input type="password" name="password" placeholder="password" disabled>
            </div>
            <div class="login-box">
                <input type="password" name="confirm" placeholder="conferma password" disabled>
            </div>
        </div>

        <button type="submit" class="inizia-btn">Inizia</button>

        <div id="feedback"></div>

    </form>

    <p class="registra-link" onclick="handleClick('schermata-accedi')">
        Hai già un account? Accedi
    </p>

</div>

<script src="js_script/scripts.js"></script>
</body>
</html>
