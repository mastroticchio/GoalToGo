<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Goal To Go — Il mio profilo</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>window.__AUTH_REQUIRES__ = { role: 'giocatore' };</script>
  <script src="js_script/auth_guard.js"></script>
</head>
<body>
  <a href="#main" class="skip-link sr-only">Salta al contenuto</a>

  <header class="header">
    <h1>GOAL TO GO</h1>
    <div class="header-right">
      <a href="home_page.html" class="home-btn" aria-label="Torna alla home">←</a>
      <div class="profile-icon" aria-hidden="true"></div>
    </div>
  </header>

  <main id="main" class="container container--center">
    <h2 class="titolo-grande">Il mio profilo</h2>
    <p class="welcome">Aggiorna i tuoi dati personali.</p>

    <form id="formProfilo" class="login-box" novalidate style="max-width: 480px;">
      <label for="profilo-nickname">Nickname</label>
      <input id="profilo-nickname" name="nickname" type="text" required maxlength="40" autocomplete="username" placeholder="Es. Kratos_125">

      <label for="profilo-email">Email</label>
      <input id="profilo-email" name="email" type="email" required autocomplete="email" placeholder="tu@esempio.it">

      <button type="submit" class="create-club-btn" style="margin-top: var(--s-4);">Salva modifiche</button>
    </form>

    <div id="feedback" role="status" aria-live="polite" style="margin-top: var(--s-3);"></div>

    <section aria-labelledby="profilo-club-h" style="margin-top: var(--s-6);">
      <h3 id="profilo-club-h" class="titolo">Il mio club</h3>
      <div id="profiloClubBox" class="actions" aria-live="polite" style="margin-top: var(--s-3);">
        <div class="skeleton" style="height: 80px; border-radius: var(--r-lg);"></div>
      </div>
    </section>

    <section aria-labelledby="profilo-partite-h" style="margin-top: var(--s-6);">
      <h3 id="profilo-partite-h" class="titolo">Le mie partite di oggi</h3>
      <div id="profiloPartiteList" class="actions" aria-live="polite" style="margin-top: var(--s-3);">
        <div class="skeleton" style="height: 80px; border-radius: var(--r-lg);"></div>
      </div>
    </section>

    <section aria-labelledby="profilo-campi-h" style="margin-top: var(--s-6);">
      <h3 id="profilo-campi-h" class="titolo">I miei campi prenotati oggi</h3>
      <div id="profiloPrenotazioniList" class="actions" aria-live="polite" style="margin-top: var(--s-3);">
        <div class="skeleton" style="height: 80px; border-radius: var(--r-lg);"></div>
      </div>
    </section>

    <section style="margin-top: var(--s-6);">
      <h3 class="titolo">Account</h3>
      <button type="button" class="btn btn--ghost" onclick="logout()" style="margin-top: var(--s-3);">Esci dall'account</button>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Navigazione principale">
    <a href="home_page.html" class="bottom-nav__item">
      <span aria-hidden="true">🏠</span><span>Home</span>
    </a>
    <a href="pagina_trova_partita.html" class="bottom-nav__item">
      <span aria-hidden="true">🔍</span><span>Trova</span>
    </a>
    <a href="pagina_club.html" class="bottom-nav__item">
      <span aria-hidden="true">👥</span><span>Club</span>
    </a>
    <a href="pagina_profilo.html" class="bottom-nav__item is-active" aria-current="page">
      <span aria-hidden="true">👤</span><span>Profilo</span>
    </a>
  </nav>

  <script src="js_script/scripts.js"></script>
</body>
</html>
