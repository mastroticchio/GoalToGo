<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Goal To Go - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
  <h1>GOAL TO GO</h1>
  <div class="profile-icon"></div>
</header>

<div class="container container--center">

  <section class="welcome welcome--center">
    <h2>Accedi</h2>
  </section>
  <form id="formLogin">

    <div class="login-box">
      <input type="email" name="email" placeholder="Email" required>
    </div>

    <div class="login-box">
      <input type="password" name="password" placeholder="Password" required>
    </div>

    <button type="submit" class="inizia-btn">Accedi</button>

    <div id="feedback"></div>

  </form>

  <!-- LINK REGISTRAZIONE -->
  <p class="registra-link" onclick="handleClick('schermata-registrati')">
    Non hai un account? <span>Registrati</span>
  </p>

</div>
<script src="js_script/scripts.js"></script>

</body>
</html>
