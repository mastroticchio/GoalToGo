<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Goal To Go</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <h1>GOAL TO GO</h1>
        <div class="profile-icon"></div>
    </header>

    <div class="container container--center">
        <section class="welcome welcome--center">
            <h2> Accedi </h2>
        </section>
        <form id="formLogin">
            <div class="login-box">
                <input type="text" placeholder="Email" id="email" name="email">
            </div>

            <div class="login-box">
                <input type="text" placeholder="Password" id="password" name="password">
            </div>
            <button type="submit">Iscriviti ora</button>
        </form>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="js_script/scripts.js"></script>
        <button class="inizia-btn" onclick="handleClick('inizia')">Inizia</button>

        <p class="registra-link" onclick="handleClick('schermata-registrati')">
            Non hai un account? <span>Registrati</span>
        </p>
    </div>

    <script src="script.js"></script>
</body>
