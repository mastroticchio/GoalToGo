<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Goal To Go — Accedi</title>
  <link rel="stylesheet" href="styles.css">
  <script>window.__AUTH_REQUIRES__ = { inverseGuard: true };</script>
  <script src="js_script/auth_guard.js"></script>
</head>

<body>

<a href="#main" class="skip-link sr-only">Salta al contenuto</a>

<header class="header">
  <h1>GOAL TO GO</h1>
  <div class="profile-icon"></div>
</header>

<main class="container container--center" id="main">

  <section class="welcome welcome--center">
    <h2>Accedi</h2>
  </section>
  <form id="formLogin">

    <div class="login-box">
      <label class="sr-only" for="email">Email</label>
      <input id="email" type="email" name="email" placeholder="Email" required autocomplete="email">
    </div>

    <div class="login-box">
      <label class="sr-only" for="password">Password</label>
      <input id="password" type="password" name="password" placeholder="Password" required autocomplete="current-password">
    </div>

    <button type="submit" class="inizia-btn">Accedi</button>

    <div id="feedback"></div>

  </form>

  <!-- LINK REGISTRAZIONE -->
  <a class="registra-link" href="pagina_registrati.html">
    Non hai un account? <span>Registrati</span>
  </a>

</main>

<nav class="bottom-nav" aria-label="Navigazione principale">
  <a href="home_page.html" class="bottom-nav__item is-active" aria-current="page">
    <span aria-hidden="true">🏠</span>
    <span>Home</span>
  </a>
  <a href="pagina_trova_partita.html" class="bottom-nav__item">
    <span aria-hidden="true">🔍</span>
    <span>Trova</span>
  </a>
  <a href="pagina_club.html" class="bottom-nav__item">
    <span aria-hidden="true">👥</span>
    <span>Club</span>
  </a>
  <a href="pagina_profilo.html" class="bottom-nav__item">
    <span aria-hidden="true">👤</span>
    <span>Profilo</span>
  </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js_script/scripts.js"></script>

</body>
</html>
