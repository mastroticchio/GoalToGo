<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Goal To Go</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="header">
  <h1>GOAL &nbsp; TO &nbsp; GO</h1>
  <div class="header-right">
    <button class="home-btn" onclick="location.href='home_page.html'">
      🏠 HOME
    </button>
    <div class="profile-icon"></div>
  </div>
</div>


  <div class="container container--center">


    <div class="campo-container search-container">
      
        <input 
            type="text" 
            placeholder="Cerca partita ..." 
            class="search-input"
  >

        <button class="orario-btn create-btn" onclick="handleClick('crea-partita')">
            crea partita
        </button>

    </div>

    <div class="actions">

      <div class="card" onclick="handleClick('trova-partita-seconda', this)">
        <div>
          <h4>informatici vs automatici</h4>
          <span class="text-white">via del mare 104</span><br>
          <span class="text-white">#009123</span>
        </div>

        <div class="campo-right">
          <strong class="titolo"><span id="count-player" class="titolo">6</span>/10</strong>
        </div>
      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
