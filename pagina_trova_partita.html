<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Goal To Go — Trova una partita</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>window.__AUTH_REQUIRES__ = { role: 'giocatore' };</script>
  <script src="js_script/auth_guard.js"></script>
</head>

<body>
  <a href="#main" class="skip-link sr-only">Salta al contenuto</a>

  <header class="header">
    <h1>GOAL &nbsp; TO &nbsp; GO</h1>
    <div class="header-right">
      <a class="home-btn" href="home_page.html" aria-label="Torna alla home">
        <span aria-hidden="true">🏠</span> HOME
      </a>
      <div class="profile-icon" aria-hidden="true"></div>
    </div>
  </header>

  <main id="main" class="container container--center">

    <form name="form_partita" id="form_partita" class="search-row">
      <label class="sr-only" for="nome_partita">Cerca partita</label>
      <input type="search" placeholder="🔍 Cerca per zona, campo, orario"
             class="search-input" name="nome_partita" id="nome_partita">
      <a class="orario-btn create-btn" href="pagina_crea_partita.html" role="button">
        + Crea partita
      </a>
    </form>

    <section aria-labelledby="mie-partite-h">
      <h3 id="mie-partite-h" class="play" style="margin-bottom: var(--s-3);">Le mie partite</h3>
      <div id="miePartiteList" class="actions" aria-live="polite" style="margin-bottom: var(--s-5);">
        <div class="skeleton" style="height: 90px; border-radius: var(--r-lg);"></div>
      </div>
    </section>

    <section aria-labelledby="trova-h">
      <h3 id="trova-h" class="play" style="margin-bottom: var(--s-3);">Trova una partita</h3>

      <div class="chip-row" role="tablist" aria-label="Filtri partita">
        <button type="button" class="chip chip--active" role="tab" aria-selected="true" data-filter="quando=oggi">Oggi</button>
        <button type="button" class="chip" role="tab" aria-selected="false" data-filter="quando=mattina">Mattina</button>
        <button type="button" class="chip" role="tab" aria-selected="false" data-filter="quando=sera">Sera</button>
        <button type="button" class="chip" role="tab" aria-selected="false" data-filter="max_prezzo=5">&lt; €5/p</button>
      </div>

      <div id="conteiner_partite" class="actions" aria-live="polite">
        <div class="skeleton" style="height: 110px; border-radius: var(--r-lg);"></div>
        <div class="skeleton" style="height: 110px; border-radius: var(--r-lg);"></div>
        <div class="skeleton" style="height: 110px; border-radius: var(--r-lg);"></div>
      </div>
    </section>

  </main>

  <a href="pagina_crea_partita.html" class="fab" aria-label="Crea una partita">
    <span aria-hidden="true">+</span>
  </a>

  <nav class="bottom-nav" aria-label="Navigazione principale">
    <a href="home_page.html" class="bottom-nav__item">
      <span aria-hidden="true">🏠</span>
      <span>Home</span>
    </a>
    <a href="pagina_trova_partita.html" class="bottom-nav__item is-active" aria-current="page">
      <span aria-hidden="true">🔍</span>
      <span>Trova</span>
    </a>
    <a href="pagina_club.html" class="bottom-nav__item">
      <span aria-hidden="true">👥</span>
      <span>Club</span>
    </a>
    <a href="pagina_profilo.html" class="bottom-nav__item">
      <span aria-hidden="true">👤</span>
      <span>Profilo</span>
    </a>
  </nav>

  <script src="js_script/scripts.js"></script>

</body>
</html>
