<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Partita</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="header">
  <h1>GOAL &nbsp; TO &nbsp; GO</h1>
  <div class="header-right">
    <button class="home-btn" onclick="location.href='home_page.html'">
      🏠 HOME
    </button>
    <div class="profile-icon"></div>
  </div>
</div>


  <div class="container container--center">

    <div class="card" style="background:none; padding:0; margin-bottom:15px;">
      <h3 class="titolo">
        Informatici vs automatici
      </h3>

      <div class="campo-right">
        <strong><span id="count-player" class="text-white"></span>/10</strong>
      </div>
    </div>
    <script>
      const count = localStorage.getItem("count-player");

    if (count !== null) {
      document.getElementById("count-player").textContent = count;
    }
    </script>

    <div class="campo">
      <img src="campo-alto.jpg" alt="campo da calcio">

      <div class="player p1" onclick="handleClick('pagamento-trova-partita-2')">+</div>
      <div class="player p2" onclick="handleClick('pagamento-trova-partita-2')">+</div>
      <div class="player p3" onclick="handleClick('pagamento-trova-partita-2')">+</div>
      <div class="player p4" onclick="handleClick('pagamento-trova-partita-2')">+</div>
      <div class="player p5" onclick="handleClick('pagamento-trova-partita-2')">+</div>
      <div class="player p6" onclick="handleClick('pagamento-trova-partita-2')">+</div>
      <div class="player p7" onclick="handleClick('pagamento-trova-partita-2')">+</div>
      <div class="player p8" onclick="handleClick('pagamento-trova-partita-2')">+</div>
      <div class="player p9" onclick="handleClick('pagamento-trova-partita-2')">+</div>
      <div class="player p10" onclick="handleClick('pagamento-trova-partita-2')">+</div>
    </div>

    <div class="campo-info">
      <p><strong>Campo :</strong> Balduina Sporting Club</p>
      <p><strong>Indirizzo :</strong> Via del mare 104, Marino</p>
      <p><strong>Orario :</strong> 19:00-20:30</p>
      <p><strong>Prezzo :</strong><span id="price">5</span>$</p>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
