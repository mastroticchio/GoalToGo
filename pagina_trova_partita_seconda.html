<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Partita</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="header">
    <h1>GOAL TO GO</h1>
    <div class="profile-icon"></div>
  </div>

  <div class="container container--center">

    <div class="card" style="background:none; padding:0; margin-bottom:15px;">
      <h3 class="titolo">
        Informatici vs automatici
      </h3>

      <div class="campo-right">
        <strong>7/10</strong>
      </div>
    </div>

    <div class="campo">
      <img src="campo-alto.jpg" alt="campo da calcio">

      <div class="player p1" onclick="handleClick('pagamento-trova-partita')">+</div>
      <div class="player p2" onclick="handleClick('pagamento-trova-partita')">+</div>
      <div class="player p3" onclick="handleClick('pagamento-trova-partita')">+</div>
      <div class="player p4" onclick="handleClick('pagamento-trova-partita')">+</div>
      <div class="player p5" onclick="handleClick('pagamento-trova-partita')">+</div>
      <div class="player p6" onclick="handleClick('pagamento-trova-partita')">+</div>
      <div class="player p7" onclick="handleClick('pagamento-trova-partita')">+</div>
      <div class="player p8" onclick="handleClick('pagamento-trova-partita')">+</div>
      <div class="player p9" onclick="handleClick('pagamento-trova-partita')">+</div>
      <div class="player p10" onclick="handleClick('pagamento-trova-partita')">+</div>
    </div>

    <div class="campo-info">
      <p><strong>Indirizzo :</strong> Via del mare 104, Marino</p>
      <p><strong>Orario :</strong> 19:00-20:30</p>
      <p><strong>Prezzo :</strong> 5$</p>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
