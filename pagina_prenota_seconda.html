<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Campo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="header">
    <h1>GOAL TO GO</h1>
    <div class="profile-icon"></div>
  </header>

    <div class="container">

        <h2 class="titolo titolo-grande">Campo di prato falcone</h2>

        <div class="campo-container">

        <div class="campo-left">
            <img src="campo.jpg" alt="campo da calcio">
        </div>

        <div class="campo-right campo-info">
            <p><strong>Indirizzo :</strong> via del mare 101, Marino RM</p>
            <p><strong>Costo :</strong> <span id="price">5</span>$</p>
            <p><strong>Categoria :</strong> Calcio a 5</p>
            <p><strong>Contatti :</strong> 06 87654321<br>+39 3715437156</p>
        </div>

        </div>

        <h3 class="fasce">fasce orarie disponibili:</h3>

        <div class="orari">
            <button class="orario-btn">18:00 - 19:00</button>
            <button class="orario-btn">19:00 - 20:00</button>
            <button class="orario-btn">20:00 - 21:00</button>
        </div>

        <div class="giocatori">
            <p>numero giocatori: <span id="count">1</span></p>
            <button class="minus-btn" onclick="handleClick('riduci-giocatori')">-</button>
            <button class="plus-btn" onclick="handleClick('aggiungi-giocatori')">+</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
