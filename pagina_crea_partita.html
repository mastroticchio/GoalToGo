<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Prenota Campo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <h1>GOAL TO GO</h1>
    <div class="profile-icon"></div>
  </header>

  <div class="container container--center">

    <section class="welcome">
      <h2>prenota il tuo campo</h2>
      <p>campi vicino a te</p>
    </section>

    <div class="campo-container search-container">
      
        <input 
            type="text" 
            placeholder="Cerca partita ..." 
            class="search-input"
  >
    </div>

    <section class="actions">

      <div class="card">

        <div>
          <h4 class="titolo text-white">Campo di prato falcone</h4>

          <img src="campo.jpg" alt="campo da calcio" style="width:100%; border-radius:10px; margin-top:10px;">

        </div>

        <div class ="campo-right">
          <p>prezzo: 50$</p>
          <p>via delle case 13<p>
          <p>contatti: +39 3666053846</p>
          <br>
          <button class="prenota-btn" onclick="handleClick('pagina-prenota-seconda-per-partite')">Prenota</button>
        </div>

      </div>

    </section>

  </div>

  <script src="script.js"></script>

</body>
</html>
