<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Goal To Go — Prenota un campo</title>
  <link rel="stylesheet" href="styles.css">
  <script>window.__AUTH_REQUIRES__ = { role: 'giocatore' };</script>
  <script src="js_script/auth_guard.js"></script>
</head>
<body>
  <a href="#main" class="skip-link sr-only">Salta al contenuto</a>

  <header class="header">
    <h1>GOAL &nbsp; TO &nbsp; GO</h1>
    <div class="header-right">
      <a class="home-btn" href="home_page.html" aria-label="Torna alla home">
        <span aria-hidden="true">🏠</span> HOME
      </a>
      <div class="profile-icon" aria-hidden="true"></div>
    </div>
  </header>

  <main id="main" class="container container--center">

    <section class="welcome">
      <h2>prenota il tuo campo</h2>
      <p>campi vicino a te</p>
    </section>

    <section aria-labelledby="mie-prenotazioni-h">
      <h3 id="mie-prenotazioni-h" class="play" style="margin-bottom: var(--s-3);">Campi prenotati oggi</h3>
      <div id="miePrenotazioniList" class="actions" aria-live="polite" style="margin-bottom: var(--s-5);">
        <div class="skeleton" style="height: 80px; border-radius: var(--r-lg);"></div>
      </div>
    </section>

    <section aria-labelledby="campi-disponibili-h">
      <h3 id="campi-disponibili-h" class="play" style="margin-bottom: var(--s-3);">Campi disponibili</h3>

      <label class="sr-only" for="search-campo">Cerca campo</label>
      <input
        id="search-campo"
        type="search"
        placeholder="🔍 Cerca per zona, campo, orario"
        class="search-input"
        style="margin-bottom: var(--s-3);">

      <div id="lista-campi-prenota" class="actions" aria-live="polite">
        <div class="skeleton" style="height: 130px; border-radius: var(--r-lg);"></div>
        <div class="skeleton" style="height: 130px; border-radius: var(--r-lg);"></div>
        <div class="skeleton" style="height: 130px; border-radius: var(--r-lg);"></div>
      </div>
    </section>

  </main>

  <nav class="bottom-nav" aria-label="Navigazione principale">
    <a href="home_page.html" class="bottom-nav__item is-active" aria-current="page">
      <span aria-hidden="true">🏠</span>
      <span>Home</span>
    </a>
    <a href="pagina_trova_partita.html" class="bottom-nav__item">
      <span aria-hidden="true">🔍</span>
      <span>Trova</span>
    </a>
    <a href="pagina_club.html" class="bottom-nav__item">
      <span aria-hidden="true">👥</span>
      <span>Club</span>
    </a>
    <a href="pagina_profilo.html" class="bottom-nav__item">
      <span aria-hidden="true">👤</span>
      <span>Profilo</span>
    </a>
  </nav>

  <script src="js_script/scripts.js"></script>

</body>
</html>
