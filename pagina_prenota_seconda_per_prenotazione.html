<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Goal To Go — Dettaglio campo (prenotazione)</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>window.__AUTH_REQUIRES__ = { role: 'giocatore' };</script>
  <script src="js_script/auth_guard.js"></script>
</head>
<body>
  <a href="#main" class="skip-link sr-only">Salta al contenuto</a>

  <header class="header">
    <h1>GOAL &nbsp; TO &nbsp; GO</h1>
    <div class="header-right">
      <a class="home-btn" href="pagina_prenota.html" aria-label="Torna alla lista campi">←</a>
      <div class="profile-icon" aria-hidden="true"></div>
    </div>
  </header>

  <main id="main" class="container container--center">

    <div id="campoDettaglio">

      <header id="campoHeader" aria-live="polite" style="margin-bottom: var(--s-4);">
        <div class="skeleton" style="height: 80px; border-radius: var(--r-md);"></div>
      </header>

      <h3 class="fasce">Fasce orarie di oggi</h3>
      <div id="campoFasce" class="orari" role="radiogroup" aria-label="Slot orari disponibili" aria-live="polite">
        <div class="skeleton" style="height: 40px; border-radius: var(--r-md);"></div>
      </div>

      <p id="orarioInfo" class="welcome" style="margin-top: var(--s-3); color: var(--text-2); font-size: var(--text-sm);">
        Seleziona uno slot per procedere alla prenotazione.
      </p>

      <button type="button" id="btnProcediPagamento" class="create-club-btn" disabled
              style="margin-top: var(--s-4);">
        Procedi al pagamento
      </button>
    </div>

  </main>

  <nav class="bottom-nav" aria-label="Navigazione principale">
    <a href="home_page.html" class="bottom-nav__item">
      <span aria-hidden="true">🏠</span>
      <span>Home</span>
    </a>
    <a href="pagina_trova_partita.html" class="bottom-nav__item">
      <span aria-hidden="true">🔍</span>
      <span>Trova</span>
    </a>
    <a href="pagina_club.html" class="bottom-nav__item">
      <span aria-hidden="true">👥</span>
      <span>Club</span>
    </a>
    <a href="pagina_profilo.html" class="bottom-nav__item">
      <span aria-hidden="true">👤</span>
      <span>Profilo</span>
    </a>
  </nav>

  <script src="js_script/scripts.js"></script>

</body>
</html>
