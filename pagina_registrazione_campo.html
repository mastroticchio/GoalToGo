<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Goal To Go — Registra il tuo campo</title>
  <link rel="stylesheet" href="styles.css">
  <script>window.__AUTH_REQUIRES__ = { role: 'gestore' };</script>
  <script src="js_script/auth_guard.js"></script>
</head>
<body>

<a href="#main" class="skip-link sr-only">Salta al contenuto</a>

<header class="header">
  <h1>GOAL &nbsp; TO &nbsp; GO</h1>
  <div class="header-right">
    <div class="profile-icon" aria-hidden="true"></div>
  </div>
</header>

<main class="container container--center" id="main">

  <div class="welcome">
    <h2>IL TUO CAMPO</h2>
  </div>

  <form id="formCampo">

    <label for="nome">Nome del campo</label>
    <input id="nome" class="input input--large" type="text"
      placeholder="Nome del Campo (es. Campo prato Falcone)" required>

    <div class="form-grid">
      <div class="form-left">
        <label for="indirizzo">Indirizzo</label>
        <input id="indirizzo" class="input" type="text" placeholder="Indirizzo" required autocomplete="street-address">
      </div>
      <div class="form-right">
        <label for="citta">Città</label>
        <input id="citta" class="input" type="text" placeholder="Città" required autocomplete="address-level2">
      </div>
    </div>

    <div class="form-grid">
      <div class="form-left">
        <label for="prezzo">Prezzo per ora</label>
        <div class="prezzo-container">
          <input id="prezzo" class="input input--prezzo" type="number" value="50" min="0" step="0.5" required>
          <span class="prezzo-label">€ / ora</span>
        </div>
      </div>

      <div class="form-right">
        <label>Disponibilità settimanale</label>
        <div class="giorni" role="group" aria-label="Giorni disponibili">
          <button type="button" class="giorno-btn" onclick="toggleGiorno(this)">Lun</button>
          <button type="button" class="giorno-btn" onclick="toggleGiorno(this)">Mar</button>
          <button type="button" class="giorno-btn" onclick="toggleGiorno(this)">Mer</button>
          <button type="button" class="giorno-btn" onclick="toggleGiorno(this)">Gio</button>
          <button type="button" class="giorno-btn" onclick="toggleGiorno(this)">Ven</button>
          <button type="button" class="giorno-btn" onclick="toggleGiorno(this)">Sab</button>
          <button type="button" class="giorno-btn" onclick="toggleGiorno(this)">Dom</button>
        </div>
      </div>
    </div>

    <label for="upload-campo">Aggiungi foto del campo</label>
    <div class="upload-box upload-box--large" id="upload-campo" onclick="aggiungiImmagine()" role="button" tabindex="0" aria-label="Aggiungi foto del campo">+</div>

    <p class="welcome" style="margin-top: var(--s-3); color: var(--text-2); font-size: var(--text-sm);">
      <span aria-hidden="true">⏰</span>
      Tutti i campi hanno 12 slot orari fissi: <strong>10:00–22:00</strong>, 1 ora ciascuno. Verranno creati automaticamente.
    </p>

    <button type="submit" class="create-club-btn">
      Conferma
    </button>

  </form>

</main>

<nav class="bottom-nav" aria-label="Navigazione gestore">
  <a href="pagina_campi_gestore.html" class="bottom-nav__item is-active" aria-current="page">
    <span aria-hidden="true">⚽</span>
    <span>Campi</span>
  </a>
  <a href="#" class="bottom-nav__item">
    <span aria-hidden="true">📋</span>
    <span>Prenotazioni</span>
  </a>
  <a href="#" class="bottom-nav__item">
    <span aria-hidden="true">📊</span>
    <span>Stats</span>
  </a>
  <a href="pagina_profilo_gestore.html" class="bottom-nav__item">
    <span aria-hidden="true">👤</span>
    <span>Profilo</span>
  </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js_script/scripts.js"></script>
</body>
</html>
