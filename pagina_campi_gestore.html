<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Goal To Go — I miei campi</title>
  <link rel="stylesheet" href="styles.css">
  <script>window.__AUTH_REQUIRES__ = { role: 'gestore' };</script>
  <script src="js_script/auth_guard.js"></script>
</head>
<body>

  <a href="#main" class="skip-link sr-only">Salta al contenuto</a>

  <header class="header">
    <h1>GOAL &nbsp; TO &nbsp; GO</h1>
    <div class="header-right">
      <div class="profile-icon" aria-hidden="true"></div>
    </div>
  </header>

  <main class="container container--center" id="main">

    <div class="miei-campi-top">
      <div>
        <h2>I miei campi</h2>
        <p class="data-oggi" id="data-oggi"></p>
      </div>
      <a class="aggiungi-campo-btn" href="pagina_registrazione_campo.html">
        + Aggiungi campo
      </a>
    </div>

    <div class="stats-grid">
  <div class="stat-card stat-card--primary">
    <div class="stat-number" id="numCampi">0</div>
    <div class="stat-label">CAMPI ATTIVI</div>
  </div>

  <div class="stat-card">
    <div class="stat-number" id="numSlot">0</div>
    <div class="stat-label">SLOT OGGI</div>
  </div>

  <div class="stat-card">
    <div class="stat-number" id="numDisponibili">0</div>
    <div class="stat-label">DISPONIBILI</div>
  </div>

  <div class="stat-card">
    <div class="stat-number" id="percentOccupazione">0%</div>
    <div class="stat-label">OCCUPAZIONE</div>
  </div>
</div>

    <h3 class="sezione-titolo">STATO CAMPI IN TEMPO REALE</h3>

    <div id="listaCampi" aria-live="polite">
      <div class="skeleton" style="height: 180px; border-radius: var(--r-lg); margin-bottom: var(--s-4);"></div>
      <div class="skeleton" style="height: 180px; border-radius: var(--r-lg); margin-bottom: var(--s-4);"></div>
    </div>

  </main>

  <nav class="bottom-nav" aria-label="Navigazione gestore">
    <a href="pagina_campi_gestore.html" class="bottom-nav__item is-active" aria-current="page">
      <span aria-hidden="true">⚽</span>
      <span>Campi</span>
    </a>
    <a href="#" class="bottom-nav__item">
      <span aria-hidden="true">📋</span>
      <span>Prenotazioni</span>
    </a>
    <a href="#" class="bottom-nav__item">
      <span aria-hidden="true">📊</span>
      <span>Stats</span>
    </a>
    <a href="pagina_profilo_gestore.html" class="bottom-nav__item">
      <span aria-hidden="true">👤</span>
      <span>Profilo</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="js_script/scripts.js"></script>

</body>
</html>
