<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Goal To Go - I miei campi</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="header">
    <h1>GOAL &nbsp; TO &nbsp; GO</h1>
    <div class="header-right">
      <div class="profile-icon"></div>
    </div>
  </div>

  <div class="container container--center">

    <div class="miei-campi-top">
      <div>
        <h2>I miei campi</h2>
        <p class="data-oggi" id="data-oggi"></p>
      </div>
      <button class="aggiungi-campo-btn" onclick="location.href='pagina_registrazione_campo.html'">
        + Aggiungi campo
      </button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="numCampi">0</div>
        <div class="stat-label">CAMPI</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="numSlot">0</div>
        <div class="stat-label">SLOT OGGI</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="numOccupati">0</div>
        <div class="stat-label">OCCUPATI</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="numIncassi">€0</div>
        <div class="stat-label">INCASSI OGGI</div>
      </div>
    </div>

    <h3 class="sezione-titolo">STATO CAMPI IN TEMPO REALE</h3>

    <div id="listaCampi"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="js_script/scripts.js"></script>

</body>
</html>
