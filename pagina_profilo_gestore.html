<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Goal To Go — Profilo gestore</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>window.__AUTH_REQUIRES__ = { role: 'gestore' };</script>
  <script src="js_script/auth_guard.js"></script>
</head>
<body>
  <a href="#main" class="skip-link sr-only">Salta al contenuto</a>

  <header class="header">
    <h1>GOAL TO GO</h1>
    <div class="header-right">
      <a href="pagina_campi_gestore.html" class="home-btn" aria-label="Torna ai campi">←</a>
      <div class="profile-icon" aria-hidden="true"></div>
    </div>
  </header>

  <main id="main" class="container container--center">
    <h2 class="titolo-grande">Profilo gestore</h2>
    <p class="welcome">Aggiorna i dati del tuo centro sportivo.</p>

    <form id="formProfilo" class="login-box" novalidate style="max-width: 480px;">
      <label for="profilo-nome">Nome del centro</label>
      <input id="profilo-nome" name="nickname" type="text" required maxlength="80" autocomplete="organization" placeholder="Es. Sporting Balduina">

      <label for="profilo-email">Email</label>
      <input id="profilo-email" name="email" type="email" required autocomplete="email" placeholder="info@centro.it">

      <button type="submit" class="create-club-btn" style="margin-top: var(--s-4);">Salva modifiche</button>
    </form>

    <div id="feedback" role="status" aria-live="polite" style="margin-top: var(--s-3);"></div>

    <section style="margin-top: var(--s-6);">
      <h3 class="titolo">Account</h3>
      <button type="button" class="btn btn--ghost" onclick="logout()" style="margin-top: var(--s-3);">Esci dall'account</button>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Navigazione gestore">
    <a href="pagina_campi_gestore.html" class="bottom-nav__item">
      <span aria-hidden="true">⚽</span><span>Campi</span>
    </a>
    <a href="#" class="bottom-nav__item">
      <span aria-hidden="true">📋</span><span>Prenotazioni</span>
    </a>
    <a href="#" class="bottom-nav__item">
      <span aria-hidden="true">📊</span><span>Stats</span>
    </a>
    <a href="pagina_profilo_gestore.html" class="bottom-nav__item is-active" aria-current="page">
      <span aria-hidden="true">👤</span><span>Profilo</span>
    </a>
  </nav>

  <script src="js_script/scripts.js"></script>
</body>
</html>
